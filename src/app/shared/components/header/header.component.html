<header class="header">
  <div class="header__search">
    <p-iconfield>
      <p-inputicon class="pi pi-search" />
      <input
        pInputText
        type="text"
        placeholder="Search courses, students, or data..."
        [(ngModel)]="searchQuery"
      />
    </p-iconfield>
  </div>

  <div class="header__actions">
    <app-theme-toggle />

    <button type="button" class="header__icon-btn" aria-label="Notifications">
      <i class="pi pi-bell"></i>
    </button>

    <p-button
      label="Logout"
      icon="pi pi-sign-out"
      severity="secondary"
      [outlined]="true"
      styleClass="header__logout-btn"
      (onClick)="logout()"
    />

    <div class="header__divider"></div>

    @if (profile(); as user) {
      <div class="header__profile">
        <div class="header__profile-info">
          <div class="header__profile-name">{{ user.name }}</div>
          <div class="header__profile-role">{{ user.roleLabel }}</div>
        </div>
        <div class="header__avatar">
          <img [src]="user.avatarUrl" [alt]="user.name" width="40" height="40" />
        </div>
      </div>
    }
  </div>
</header>
