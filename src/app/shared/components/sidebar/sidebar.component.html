<aside class="sidebar">
  <div class="sidebar__brand">
    <div class="sidebar__logo">
      <i class="pi pi-graduation-cap"></i>
    </div>
    <div>
      <div class="sidebar__title">EduFlow Admin</div>
      <div class="sidebar__subtitle">Educational Platform</div>
    </div>
  </div>

  <nav class="sidebar__nav">
    @for (item of navItems; track item.route) {
      <a
        class="sidebar__link"
        [routerLink]="item.route"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
      >
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar__user">
    <img
      class="sidebar__user-avatar"
      src="https://i.pravatar.cc/80?img=33"
      alt="Dr. Julian Reed"
      width="36"
      height="36"
    />
    <div>
      <div class="sidebar__user-name">Dr. Julian Reed</div>
      <div class="sidebar__user-role">System Administrator</div>
    </div>
  </div>
</aside>
