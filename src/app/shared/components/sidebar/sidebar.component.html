<aside class="sidebar">
  <div class="sidebar__brand">
    <div class="sidebar__logo">
      <i class="pi pi-graduation-cap"></i>
    </div>
    <div>
      <div class="sidebar__title">EduFlow Admin</div>
      <div class="sidebar__subtitle">Educational Platform</div>
    </div>
  </div>

  <nav class="sidebar__nav">
    @for (item of navItems; track item.route) {
      <a
        class="sidebar__link"
        [routerLink]="item.route"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
      >
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar__footer">
    @if (user(); as profile) {
      <div class="sidebar__user">
        <img
          class="sidebar__user-avatar"
          [src]="profile.avatarUrl"
          [alt]="profile.name"
          width="36"
          height="36"
        />
        <div class="sidebar__user-info">
          <div class="sidebar__user-name">{{ profile.name }}</div>
          <div class="sidebar__user-role">{{ profile.roleLabel }}</div>
        </div>
      </div>

      <button type="button" class="sidebar__logout" (click)="logout()">
        <i class="pi pi-sign-out"></i>
        <span>Logout</span>
      </button>
    }
  </div>
</aside>
