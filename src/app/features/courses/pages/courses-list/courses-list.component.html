<div class="courses-page">
  <div class="courses-page__header">
    <div>
      <h1>Courses</h1>
      <p>Manage institutional curriculum and course lifecycle.</p>
    </div>
    <p-button label="Add Course" icon="pi pi-plus" />
  </div>

  <div class="courses-page__toolbar">
    <app-filters />
    <div class="courses-page__actions">
      <button type="button" class="courses-page__action-link">
        <i class="pi pi-filter"></i> More Filters
      </button>
      <button type="button" class="courses-page__action-link">
        <i class="pi pi-upload"></i> Export
      </button>
    </div>
  </div>

  <app-table />

  <div class="courses-page__stats">
    @for (stat of stats; track stat.label) {
      <div class="stat-card">
        <div class="stat-card__icon" [style.background]="stat.iconBg" [style.color]="stat.iconColor">
          <i [class]="stat.icon"></i>
        </div>
        <div class="stat-card__content">
          <div class="stat-card__label">{{ stat.label }}</div>
          <div class="stat-card__value">{{ stat.value }}</div>
          <div class="stat-card__trend" [class.stat-card__trend--up]="stat.trendUp === true">
            {{ stat.trend }}
          </div>
        </div>
      </div>
    }
  </div>
</div>
