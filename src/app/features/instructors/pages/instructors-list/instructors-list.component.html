<div class="instructors-page">
  <div class="instructors-page__header">
    <div>
      <h1>Instructors</h1>
      <p>Manage faculty profiles, assignments, and teaching schedules.</p>
    </div>
    <p-button label="Add Instructor" icon="pi pi-plus" />
  </div>

  <div class="instructors-page__toolbar">
    <div class="instructors-page__filters">
      <p-select
        [(ngModel)]="selectedDepartment"
        [options]="departmentOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="All Departments"
        styleClass="instructors-page__filter"
      />
      <p-select
        [(ngModel)]="selectedStatus"
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="All Status"
        styleClass="instructors-page__filter"
      />
    </div>
    <button type="button" class="instructors-page__export">
      <i class="pi pi-upload"></i> Export
    </button>
  </div>

  <div class="instructors-page__table-card">
    <p-table [value]="instructors" [paginator]="true" [rows]="10" styleClass="instructors-table">
      <ng-template pTemplate="header">
        <tr>
          <th>INSTRUCTOR</th>
          <th>EMAIL</th>
          <th>DEPARTMENT</th>
          <th>COURSES</th>
          <th>STATUS</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-instructor>
        <tr>
          <td>
            <div class="instructor-name">
              <div class="instructor-name__avatar">{{ instructor.name.charAt(0) }}</div>
              <div>
                <div class="instructor-name__title">{{ instructor.name }}</div>
                <div class="instructor-name__id">ID: {{ instructor.id }}</div>
              </div>
            </div>
          </td>
          <td>{{ instructor.email }}</td>
          <td>{{ instructor.department }}</td>
          <td>{{ instructor.courses }}</td>
          <td>
            <p-tag [value]="instructor.status" [severity]="getStatusSeverity(instructor.status)" />
          </td>
          <td>
            <button type="button" class="instructors-page__menu-btn" aria-label="Instructor actions">
              <i class="pi pi-ellipsis-v"></i>
            </button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
