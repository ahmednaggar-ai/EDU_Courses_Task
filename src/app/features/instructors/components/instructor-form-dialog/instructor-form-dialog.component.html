<form class="entity-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <div class="entity-form__field" [class.entity-form__field--invalid]="isInvalid('name')">
    <label for="instructor-name">Full Name</label>
    <input
      id="instructor-name"
      pInputText
      formControlName="name"
      placeholder="Enter instructor name"
      [class.ng-invalid]="isInvalid('name')"
    />
    @if (fieldError('name'); as error) {
      <small class="entity-form__error">{{ error }}</small>
    }
  </div>

  <div class="entity-form__field" [class.entity-form__field--invalid]="isInvalid('email')">
    <label for="instructor-email">Email</label>
    <input
      id="instructor-email"
      pInputText
      formControlName="email"
      placeholder="name@eduflow.edu"
      [class.ng-invalid]="isInvalid('email')"
    />
    @if (fieldError('email'); as error) {
      <small class="entity-form__error">{{ error }}</small>
    }
  </div>

  <div class="entity-form__row">
    <div class="entity-form__field" [class.entity-form__field--invalid]="isInvalid('department')">
      <label for="instructor-department">Department</label>
      <p-select
        inputId="instructor-department"
        formControlName="department"
        [options]="departmentOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Select department"
        [class.ng-invalid]="isInvalid('department')"
      />
      @if (fieldError('department'); as error) {
        <small class="entity-form__error">{{ error }}</small>
      }
    </div>

    <div class="entity-form__field" [class.entity-form__field--invalid]="isInvalid('status')">
      <label for="instructor-status">Status</label>
      <p-select
        inputId="instructor-status"
        formControlName="status"
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Select status"
        [class.ng-invalid]="isInvalid('status')"
      />
      @if (fieldError('status'); as error) {
        <small class="entity-form__error">{{ error }}</small>
      }
    </div>
  </div>

  <div class="entity-form__footer">
    <p-button label="Cancel" severity="secondary" [outlined]="true" type="button" (onClick)="cancel()" />
    <p-button [label]="isEdit ? 'Save Changes' : 'Add Instructor'" type="submit" />
  </div>
</form>
